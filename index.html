// CEO MODE - Helper Functions
const getMomentumColor = (status) => {
  switch(status) {
    case "up": return "#ef4444";
    case "down": return "#f59e0b";
    default: return "#6366f1";
  }
};

const getGrowthLevelColor = (growth, average) => {
  if (growth <= 0) return "#ef4444";
  if (growth >= average * 1.2) return "#10b981";
  if (growth >= average * 0.8) return "#eab308";
  return "#ef4444";
};

function MarketingDashboard() {
  const [period, setPeriod] = React.useState("today");

  const analyzeCEOInsights = (period) => {
    const allScores = [];
    accounts.forEach(acc => {
      if (acc.ig) {
        const data = period === "today" ? igData[acc.ig] : igDataYesterday[acc.ig];
        if (data) allScores.push({...acc, platform: "ig", growth: data.change || 0});
      }
      if (acc.tiktok) {
        const data = period === "today" ? tiktokData[acc.tiktok] : tiktokDataYesterday[acc.tiktok];
        if (data) allScores.push({...acc, platform: "tt", growth: data.change || 0});
      }
    });
    const winner = allScores.reduce((a, b) => (a.growth > b.growth ? a : b), allScores[0]);
    const threat = allScores.filter(s => s.growth < 0).sort((a, b) => a.growth - b.growth)[0] || allScores.reduce((a, b) => (a.growth < b.growth ? a : b));
    const opportunity = allScores[1] || allScores[0];
    const attention = allScores.find(s => s.ours) || allScores[0];
    return { winner, threat, opportunity, attention };
  };

  const { winner, threat, opportunity, attention } = analyzeCEOInsights(period);

  const CEOCard = ({ title, emoji, name, value, subtitle, color }) => (
    <div style={{
      background: `linear-gradient(135deg, ${color}11 0%, transparent 100%)`,
      border: `2px solid ${color}66`,
      borderRadius: 12,
      padding: 16,
      flex: 1,
      minWidth: 200,
    }}>
      <div style={{ fontSize: 12, color, fontWeight: 700, textTransform: "uppercase", marginBottom: 8 }}>
        {emoji} {title}
      </div>
      <div style={{ fontSize: 18, fontWeight: 700, color: COLORS.text, marginBottom: 4 }}>
        {name}
      </div>
      <div style={{ fontSize: 20, fontWeight: 800, color, marginBottom: 8 }}>
        {value}
      </div>
      <div style={{ fontSize: 11, color: COLORS.textMuted }}>
        {subtitle}
      </div>
    </div>
  );

  const periods = [
    { key: "today", label: "📊 Hari Ini", sub: "10 Apr" },
    { key: "yesterday", label: "📅 Kemarin", sub: "9 Apr (Full)" },
  ];

  return (
    <div style={{
      background: COLORS.bg,
      minHeight: "100vh",
      color: COLORS.text,
      fontFamily: "'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif",
      padding: "24px 32px",
    }}>
      <div style={{ marginBottom: 28 }}>
        <h1 style={{ fontSize: 28, fontWeight: 800, margin: 0, letterSpacing: -0.5 }}>
          Marketing Dashboard
        </h1>
        <p style={{ color: COLORS.textMuted, fontSize: 14, margin: "6px 0 0" }}>
          Data SocialBlade — 10 April 2026 | 14 Akun | Instagram & TikTok
        </p>
      </div>

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24, gap: 12 }}>
        <div style={{ display: "flex", gap: 4, background: COLORS.cardBg, borderRadius: 12, padding: 4 }}>
          <button style={{ padding: "10px 20px", borderRadius: 10, border: "none", cursor: "pointer", fontSize: 14, fontWeight: 600, background: COLORS.accent, color: "#fff" }}>
            Overview
          </button>
        </div>
        <div style={{ display: "flex", gap: 4, background: COLORS.cardBg, borderRadius: 12, padding: 4 }}>
          {periods.map((p) => (
            <button key={p.key} onClick={() => setPeriod(p.key)} style={{
              padding: "8px 16px", borderRadius: 10, border: "none", cursor: "pointer", fontSize: 13, fontWeight: 600,
              background: period === p.key ? "#166534" : "transparent",
              color: period === p.key ? "#fff" : COLORS.textMuted,
            }}>
              {p.label}
            </button>
          ))}
        </div>
      </div>

      {/* CEO MODE */}
      <div style={{ marginBottom: 32 }}>
        <h2 style={{ fontSize: 14, fontWeight: 700, color: COLORS.textMuted, textTransform: "uppercase", marginBottom: 12, marginTop: 0 }}>
          📊 Kesimpulan {period === "today" ? "Hari Ini" : "Kemarin"}
        </h2>
        <div style={{ display: "flex", gap: 12, marginBottom: 24, flexWrap: "wrap" }}>
          <CEOCard title="Pemenang" emoji="🏆" name={winner.name} value={`+${winner.growth}`} subtitle="Growth tertinggi" color="#10b981" />
          <CEOCard title="Ancaman" emoji="⚠️" name={threat.name} value={`${threat.growth}`} subtitle="Menurun/Terendah" color="#ef4444" />
          <CEOCard title="Peluang" emoji="💡" name={opportunity.name} value="Aktif" subtitle="Engagement tinggi" color="#3b82f6" />
          <CEOCard title="Perlu Perhatian" emoji="🔔" name={attention.name} value={`${attention.growth >= 0 ? '+' : ''}${attention.growth}`} subtitle={attention.ours ? "⭐ Platform utama" : "Performa rendah"} color={attention.ours ? "#f59e0b" : "#ef4444"} />
        </div>
      </div>

      <h2 style={{ fontSize: 18, fontWeight: 700, marginBottom: 16 }}>Semua Akun</h2>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(250px, 1fr))", gap: 12 }}>
        {accounts.map((acc, i) => {
          const igData_ = period === "today" ? igData[acc.ig] : igDataYesterday[acc.ig];
          const ttData_ = period === "today" ? tiktokData[acc.tiktok] : tiktokDataYesterday[acc.tiktok];

          return (
            <div key={i}>
              {igData_ && (
                <div style={{ background: COLORS.cardBg, border: `1px solid ${COLORS.cardBorder}`, borderRadius: 12, padding: 12, marginBottom: 12 }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: COLORS.text, marginBottom: 8 }}>
                    {acc.name} (IG)
                  </div>
                  <div style={{ fontSize: 14, fontWeight: 700, color: igData_.change > 0 ? "#10b981" : "#ef4444" }}>
                    {igData_.change > 0 ? "+" : ""}{igData_.change}
                  </div>
                  <div style={{ fontSize: 11, color: COLORS.textMuted }}>
                    {igData_.followers?.toLocaleString()} followers
                  </div>
                </div>
              )}
              {ttData_ && (
                <div style={{ background: COLORS.cardBg, border: `1px solid ${COLORS.cardBorder}`, borderRadius: 12, padding: 12 }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: COLORS.text, marginBottom: 8 }}>
                    {acc.name} (TT)
                  </div>
                  <div style={{ fontSize: 14, fontWeight: 700, color: ttData_.change > 0 ? "#10b981" : "#ef4444" }}>
                    {ttData_.change > 0 ? "+" : ""}{ttData_.change}
                  </div>
                  <div style={{ fontSize: 11, color: COLORS.textMuted }}>
                    {ttData_.followers?.toLocaleString()} followers
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.render(<MarketingDashboard />, document.getElementById('root'));
    </script>
</body>
</html>

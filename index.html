const formatNum = (n) => {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + "M";
  if (n >= 1000) return (n / 1000).toFixed(1) + "K";
  return n?.toString() || "0";
};

const formatFull = (n) => n?.toLocaleString("id-ID") || "0";

const ChangeIndicator = ({ value }) => {
  if (value === null || value === undefined) return <span style={{ color: COLORS.textMuted, fontSize: 13 }}>0</span>;
  const color = value > 0 ? COLORS.positive : value < 0 ? COLORS.negative : COLORS.textMuted;
  const arrow = value > 0 ? "\u25B2" : value < 0 ? "\u25BC" : "\u25CF";
  const prefix = value > 0 ? "+" : "";
  return (
    <span style={{ color, fontWeight: 700, fontSize: 15 }}>
      {arrow} {prefix}{formatFull(value)}
    </span>
  );
};

const GradeBadge = ({ grade }) => {
  const bgMap = { "A-": "#166534", "B+": "#1e40af", "B": "#6b21a8", "C+": "#92400e" };

const ComparisonChart = ({ platform }) => {
  const data = accounts.map((acc) => {
    const key = acc.ig;
    const d = platform === "ig" ? igData[key] : tiktokData[acc.tiktok || key];
    return { name: acc.name.length > 12 ? acc.name.slice(0, 10) + "\u2026" : acc.name, fullName: acc.name, change: d?.change ?? 0, followers: d?.followers ?? 0, available: d !== null && d !== undefined, ours: acc.ours };
  }).filter(d => d.available).sort((a, b) => b.change - a.change);
  return (
    <Card>
      <h3 style={{ color: COLORS.text, fontSize: 16, fontWeight: 700, marginBottom: 16, marginTop: 0 }}>{platform === "ig" ? "\uD83D\uDCF8 Instagram" : "\uD83C\uDFB5 TikTok"} â Pertumbuhan Followers Hari Ini</h3>
      <ResponsiveContainer width="100%" height={280}>
        <BarChart data={data} margin={{ top: 10, right: 10, left: 0, bottom: 0 }}>
          <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" />
          <XAxis dataKey="name" tick={{ fill: COLORS.textMuted, fontSize: 11 }} />
          <YAxis tick={{ fill: COLORS.textMuted, fontSize: 11 }} />
          <Tooltip contentStyle={{ background: "#1e293b", border: "1px solid #334155", borderRadius: 8, color: "#fff" }} formatter={(val, name, entry) => [(val > 0 ? "+" : "") + val, entry.payload.fullName]} labelFormatter={() => ""} />
          <Bar dataKey="change" radius={[6, 6, 0, 0]}>
            {data.map((entry, i) => (
              <Cell key={i} fill={entry.ours ? "#f59e0b" : (entry.change > 0 ? COLORS.positive : entry.change < 0 ? COLORS.negative : COLORS.neutral)} stroke={entry.ours ? "#fbbf24" : "none"} strokeWidth={entry.ours ? 2 : 0} />
            ))}
          </Bar>
        </BarChart>
      </ResponsiveContainer>
    </Card>
  );
};

  const history = platform === "ig" ? igHistory : tiktokHistory;
  const key = selectedAccount?.ig || "";
  const tKey = platform === "tiktok" ? (selectedAccount?.tiktok || selectedAccount?.ig || "") : key;
  const accountHistory = history[tKey];
  if (!accountHistory) return (
    <Card>
      <h3 style={{ color: COLORS.text, fontSize: 16, fontWeight: 700, marginTop: 0 }}>{platform === "ig" ? "\uD83D\uDCF8" : "\uD83C\uDFB5"} Tren 14 Hari â {selectedAccount?.name || "Pilih akun"}</h3>
      <div style={{ color: COLORS.textMuted, textAlign: "center", padding: 40 }}>{selectedAccount ? "Data tidak tersedia untuk akun ini" : "Pilih akun untuk melihat tren"}</div>
    </Card>
  );
  return (
    <Card>
      <h3 style={{ color: COLORS.text, fontSize: 16, fontWeight: 700, marginTop: 0 }}>{platform === "ig" ? "\uD83D\uDCF8" : "\uD83C\uDFB5"} Tren 14 Hari â {selectedAccount.name}</h3>
      <ResponsiveContainer width="100%" height={240}>
        <LineChart data={accountHistory} margin={{ top: 10, right: 10, left: 0, bottom: 0 }}>
          <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" />
          <XAxis dataKey="date" tick={{ fill: COLORS.textMuted, fontSize: 10 }} />
          <YAxis tick={{ fill: COLORS.textMuted, fontSize: 10 }} domain={["dataMin - 100", "dataMax + 100"]} tickFormatter={formatNum} />
          <Tooltip contentStyle={{ background: "#1e293b", border: "1px solid #334155", borderRadius: 8, color: "#fff" }} formatter={(val) => [formatFull(val), "Followers"]} />
          <Line type="monotone" dataKey="f" stroke={platform === "ig" ? COLORS.ig : COLORS.tiktok} strokeWidth={3} dot={{ fill: platform === "ig" ? COLORS.ig : COLORS.tiktok, r: 3 }} activeDot={{ r: 6 }} />
        </LineChart>
      </ResponsiveContainer>
    </Card>
  );
};

const RankingTable = ({ platform }) => {
  const ranked = accounts.map((acc) => {
    const key = acc.ig;
    const d = platform === "ig" ? igData[key] : tiktokData[acc.tiktok || key];
    return { name: acc.name, data: d, ours: acc.ours };
  }).filter((r) => r.data).sort((a, b) => (b.data.change ?? -Infinity) - (a.data.change ?? -Infinity));
  return (
    <Card>
      <h3 style={{ color: COLORS.text, fontSize: 16, fontWeight: 700, marginTop: 0, marginBottom: 12 }}>{platform === "ig" ? "\uD83D\uDCF8 Instagram" : "\uD83C\uDFB5 TikTok"} â Ranking Pertumbuhan Hari Ini</h3>
      <table style={{ width: "100%", borderCollapse: "collapse" }}>
        <thead>
          <tr style={{ borderBottom: "1px solid " + COLORS.cardBorder }}>
            <th style={{ textAlign: "left", padding: "8px 6px", color: COLORS.textMuted, fontSize: 11, fontWeight: 600 }}>#</th>
            <th style={{ textAlign: "left", padding: "8px 6px", color: COLORS.textMuted, fontSize: 11, fontWeight: 600 }}>Akun</th>
            <th style={{ textAlign: "right", padding: "8px 6px", color: COLORS.textMuted, fontSize: 11, fontWeight: 600 }}>Pertumbuhan</th>
            <th style={{ textAlign: "right", padding: "8px 6px", color: COLORS.textMuted, fontSize: 11, fontWeight: 600 }}>Followers</th>
            <th style={{ textAlign: "center", padding: "8px 6px", color: COLORS.textMuted, fontSize: 11, fontWeight: 600 }}>Grade</th>
          </tr>
        </thead>
        <tbody>
          {ranked.map((r, i) => (
            <tr key={i} style={{ borderBottom: "1px solid " + COLORS.cardBorder + "22", background: r.ours ? "rgba(245, 158, 11, 0.08)" : "transparent", borderLeft: r.ours ? "3px solid #f59e0b" : "3px solid transparent" }}>
              <td style={{ padding: "10px 6px", color: i === 0 ? "#fbbf24" : COLORS.textMuted, fontSize: 14, fontWeight: 700 }}>{i === 0 ? "\uD83E\uDD47" : i === 1 ? "\uD83E\uDD48" : i === 2 ? "\uD83E\uDD49" : i + 1}</td>
              <td style={{ padding: "10px 6px", color: r.ours ? "#fbbf24" : COLORS.text, fontSize: 14, fontWeight: 600 }}>{r.ours ? "\u2B50 " : ""}{r.name}</td>
              <td style={{ padding: "10px 6px", textAlign: "right" }}><ChangeIndicator value={r.data.change} /></td>
              <td style={{ padding: "10px 6px", textAlign: "right", color: r.ours ? "#fef3c7" : COLORS.text, fontSize: 14 }}>{formatFull(r.data.followers)}</td>
              <td style={{ padding: "10px 6px", textAlign: "center" }}><GradeBadge grade={r.data.grade} /></td>
            </tr>
          ))}
        </tbody>
      </table>
    </Card>
  );
};

function MarketingDashboard() {
  const [selectedIgAccount, setSelectedIgAccount] = useState(accounts[0]);
  const [selectedTiktokAccount, setSelectedTiktokAccount] = useState(accounts[0]);
  const [activeTab, setActiveTab] = useState("overview");
  const tabs = [
    { key: "overview", label: "Overview" },
    { key: "instagram", label: "\uD83D\uDCF8 Instagram" },
    { key: "tiktok", label: "\uD83C\uDFB5 TikTok" },
  ];
  return (
    <div style={{ background: COLORS.bg, minHeight: "100vh", color: COLORS.text, fontFamily: "'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif", padding: "24px 32px" }}>
      <div style={{ marginBottom: 28 }}>
        <h1 style={{ fontSize: 28, fontWeight: 800, margin: 0, letterSpacing: -0.5 }}>Marketing Dashboard</h1>
        <p style={{ color: COLORS.textMuted, fontSize: 14, margin: "6px 0 0" }}>Data SocialBlade â 9 April 2026 | 8 Akun | Instagram & TikTok</p>
      </div>
      <div style={{ display: "flex", gap: 4, marginBottom: 24, background: COLORS.cardBg, borderRadius: 12, padding: 4, width: "fit-content" }}>
        {tabs.map((t) => (
          <button key={t.key} onClick={() => setActiveTab(t.key)} style={{ padding: "10px 20px", borderRadius: 10, border: "none", cursor: "pointer", fontSize: 14, fontWeight: 600, background: activeTab === t.key ? COLORS.accent : "transparent", color: activeTab === t.key ? "#fff" : COLORS.textMuted, transition: "all 0.2s" }}>{t.label}</button>
        ))}
      </div>
      {activeTab === "overview" && (
        <>
          <SummaryRow />
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginBottom: 24 }}>
            <ComparisonChart platform="ig" />
            <ComparisonChart platform="tiktok" />
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
            <RankingTable platform="ig" />
            <RankingTable platform="tiktok" />
          </div>
        </>
      )}
      {activeTab === "instagram" && (
        <>
          <h2 style={{ fontSize: 20, fontWeight: 700, marginBottom: 16, marginTop: 0 }}>Instagram â Diurutkan Pertumbuhan Tertinggi</h2>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12, marginBottom: 24 }}>
            {[...accounts].sort((a, b) => (igData[b.ig]?.change ?? -Infinity) - (igData[a.ig]?.change ?? -Infinity)).map((acc, i) => (
              <AccountCard key={i} acc={acc} platform="ig" isSelected={selectedIgAccount?.name === acc.name} onClick={() => setSelectedIgAccount(acc)} />
            ))}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginBottom: 24 }}>
            <TrendChart platform="ig" selectedAccount={selectedIgAccount} />
            <ComparisonChart platform="ig" />
          </div>
          <RankingTable platform="ig" />
        </>
      )}
      {activeTab === "tiktok" && (
        <>
          <h2 style={{ fontSize: 20, fontWeight: 700, marginBottom: 16, marginTop: 0 }}>TikTok â Diurutkan Pertumbuhan Tertinggi</h2>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12, marginBottom: 24 }}>
            {[...accounts].sort((a, b) => { const dA = tiktokData[a.tiktok || a.ig]; const dB = tiktokData[b.tiktok || b.ig]; return (dB?.change ?? -Infinity) - (dA?.change ?? -Infinity); }).map((acc, i) => (
              <AccountCard key={i} acc={acc} platform="tiktok" isSelected={selectedTiktokAccount?.name === acc.name} onClick={() => setSelectedTiktokAccount(acc)} />
            ))}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginBottom: 24 }}>
            <TrendChart platform="tiktok" selectedAccount={selectedTiktokAccount} />
            <ComparisonChart platform="tiktok" />
          </div>
          <RankingTable platform="tiktok" />
        </>
      )}
      <div style={{ textAlign: "center", color: COLORS.textMuted, fontSize: 11, marginTop: 32, padding: "16px 0", borderTop: "1px solid " + COLORS.cardBorder }}>
        Sumber data: SocialBlade.com | Terakhir diperbarui: 9 April 2026 (Refreshed) | Dashboard dibuat otomatis
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<MarketingDashboard />);
  </script>
</body>
</html>
